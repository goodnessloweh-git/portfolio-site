<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Loweh Goodness - Junior DevOps Engineer. Building real infrastructure, automating deployments, and getting better at it every single day.">
  <title>Loweh Goodness | DevOps Engineer</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --surface2: #181818;
      --border: #222222;
      --accent: #e8612a;
      --accent2: #f0845a;
      --text: #f0ece6;
      --muted: #888880;
      --light: #c8c4bc;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      line-height: 1.7;
      overflow-x: hidden;
    }

    h1, h2, h3, h4, h5, .brand {
      font-family: 'Syne', sans-serif;
    }

    /* NAV */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 1.2rem 4rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(10,10,10,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }

    .brand {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: var(--text);
      text-decoration: none;
    }

    .brand span { color: var(--accent); }

    .nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
    }

    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    .nav-links a:hover { color: var(--accent); }

    .nav-cta {
      background: var(--accent);
      color: #fff !important;
      padding: 0.5rem 1.2rem;
      border-radius: 2px;
    }

    .nav-cta:hover { background: var(--accent2); color: #fff !important; }

    /* HERO */
    .hero {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: center;
      padding: 8rem 4rem 4rem;
      gap: 4rem;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: -20%;
      right: -10%;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(232,97,42,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-tag {
      display: inline-block;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid rgba(232,97,42,0.3);
      padding: 0.35rem 0.8rem;
      border-radius: 2px;
      margin-bottom: 1.5rem;
    }

    .hero h1 {
      font-size: clamp(2.8rem, 5vw, 4.5rem);
      font-weight: 800;
      line-height: 1.05;
      margin-bottom: 1.5rem;
      letter-spacing: -0.02em;
    }

    .hero h1 .accent { color: var(--accent); }
